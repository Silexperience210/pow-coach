name: CI

on:
  push:            # toutes les branches : les régressions sont attrapées avant merge
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Syntax check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: node --check on Functions, Ledger Worker, app.js, sw.js
        run: |
          set -e
          fail=0
          files="$(find functions ledger-worker/src -name '*.js') app.js sw.js"
          for f in $files; do
            echo "· $f"
            node --check "$f" || fail=1
          done
          exit $fail

      - name: Unit tests (functions/_shared.js)
        run: npm test

      - name: Guard against committed secrets
        run: |
          set -e
          # échoue si une vraie clé/valeur sensible fuit dans le code versionné
          if grep -RInE "(LNBITS_ADMIN_KEY[\"'[:space:]=]+[A-Za-z0-9]{16,})|-----BEGIN [A-Z ]*PRIVATE KEY-----|xprv[0-9a-zA-Z]{20,}" \
               --include='*.js' --include='*.mjs' --include='*.html' --include='*.md' .; then
            echo "::error::secret-looking value committed"; exit 1
          fi
          echo "no committed secrets detected"
