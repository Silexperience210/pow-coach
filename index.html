<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0C">
<title>PoW Coach — Proof of Workout ⚡</title>

<!-- ╔══════════════════════════════════════════════════════════════════╗
     ║  ⚙ CONFIGURATION PROPRIÉTAIRE — À ÉDITER AVANT DÉPLOIEMENT       ║
     ║                                                                    ║
     ║  🔒 AUCUNE CLÉ ICI. L'admin key LNbits vit dans un Secret chiffré  ║
     ║  Cloudflare Pages (functions/), jamais dans l'app.                 ║
     ║  Laisse API_BASE:"" pour appeler les Functions du même domaine.    ║
     ║  Voir README.md pour le déploiement.                               ║
     ╚══════════════════════════════════════════════════════════════════╝ -->
<script>
window.POW_CONFIG = Object.freeze({
  // Laisse "" pour utiliser le même domaine que l'app (recommandé sur Cloudflare Pages).
  // Sinon mets l'origine de tes Functions, ex: "https://coachsats.pages.dev"
  API_BASE: "",
  REQUIRE_AUTH: false,         // true = connexion LNURL-auth obligatoire pour gagner/retirer
  SATS_PERFECT: 1,             // sats par geste parfait
  COMBO_TIERS: [               // paliers de combo (gestes parfaits consécutifs)
    { at: 5,  sats: 2 },       // à partir de x5 : 2 sats / geste parfait
    { at: 10, sats: 3 },
    { at: 21, sats: 5 }
  ],
  SATS_WEEKLY_GOAL: 21,        // bonus quand un objectif hebdo est atteint
  PERFECT_THRESHOLD: 92,       // % de forme minimum pour "parfait"
  DAILY_CAP_SATS: 100,         // plafond de sats gagnables / jour / appareil (côté client)
  MIN_CLAIM_SATS: 10,          // solde minimum pour retirer
  MAX_CLAIM_SATS: 100          // max par retrait — DOIT refléter MAX_CLAIM_SATS côté serveur
});
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#0A0A0C; --panel:#141419; --panel2:#1C1C24; --line:#2A2A35;
  --acc:#FF6B00; --acc2:#FFB86B; --hot:#FF2244; --grn:#3DFFA0;
  --txt:#EDEDF2; --dim:#8A8A99;
  --glow:0 0 12px color-mix(in srgb,var(--acc) 55%,transparent), 0 0 34px color-mix(in srgb,var(--acc) 22%,transparent);
}
/* ---- thèmes par discipline ---- */
body[data-theme="muscu"]  {--acc:#FF6B00;--acc2:#FFB86B;--hot:#FF2244}
body[data-theme="gainage"]{--acc:#00D4FF;--acc2:#8FE9FF;--hot:#2E6BFF}
body[data-theme="yoga"]   {--acc:#A78BFA;--acc2:#D6C7FF;--hot:#F472B6}
body[data-theme="pilates"]{--acc:#FF4FA3;--acc2:#FFA8D2;--hot:#B4008C}
body[data-theme="street"] {--acc:#B8FF29;--acc2:#E2FF9B;--hot:#3DFFA0}
body[data-theme="boxe"]   {--acc:#FF2244;--acc2:#FF8DA0;--hot:#FF6B00}
body[data-theme="thai"]   {--acc:#FFC531;--acc2:#FFE39B;--hot:#FF7A00}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--txt);font-family:'Rajdhani',sans-serif;font-size:17px;overflow-x:hidden;
  transition:--acc .3s}
h1,h2,h3,.disp{font-family:'Chakra Petch',monospace;letter-spacing:.04em;text-transform:uppercase}
button{font-family:'Chakra Petch',monospace;cursor:pointer;border:none;background:none;color:inherit}

/* scanlines + halo ambiant */
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(255,255,255,.014) 2px 4px)}
.aurora{position:fixed;top:-30dvh;left:50%;transform:translateX(-50%);width:140vw;height:60dvh;z-index:0;
  background:radial-gradient(ellipse at center,color-mix(in srgb,var(--acc) 16%,transparent),transparent 68%);
  pointer-events:none;transition:background .6s;filter:blur(10px)}

.screen{display:none;min-height:100dvh;padding:16px 16px calc(20px + env(safe-area-inset-bottom));position:relative;z-index:1}
.screen.active{display:block}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.brand{font-family:'Chakra Petch',monospace;font-weight:700;font-size:18px;letter-spacing:.06em;white-space:nowrap}
.brand b{color:var(--acc)}
.iconbtn{min-width:42px;height:42px;border-radius:10px;background:var(--panel);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--acc2);padding:0 10px}
.iconbtn:active{background:var(--panel2)}
.iconbtn.off{opacity:.45}

.chip{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,color-mix(in srgb,var(--acc) 14%,#111),var(--panel));
  border:1px solid color-mix(in srgb,var(--acc) 45%,transparent);border-radius:999px;padding:7px 14px;
  font-family:'Chakra Petch',monospace;font-weight:600}
.chip .zap{color:var(--acc);text-shadow:var(--glow)}
.chip.bump{animation:bump .45s ease}
@keyframes bump{35%{transform:scale(1.14)}}

/* sport cards, chacune porte l'accent de son thème */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 14px;position:relative;
  overflow:hidden;text-align:left;transition:transform .12s}
.card:active{transform:scale(.97);border-color:var(--c)}
.card .em{font-size:30px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 10px color-mix(in srgb,var(--c) 60%,transparent))}
.card h3{font-size:14px;margin-bottom:3px}
.card p{color:var(--dim);font-size:12.5px;line-height:1.25}
.card::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--c)}
.card::after{content:"";position:absolute;top:-40%;right:-30%;width:80%;height:80%;border-radius:50%;
  background:radial-gradient(circle,color-mix(in srgb,var(--c) 13%,transparent),transparent 70%)}

.exrow{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:14px;margin-bottom:10px;width:100%;text-align:left}
.exrow:active{border-color:var(--acc)}
.exrow .em{font-size:28px}
.exrow .meta{flex:1}
.exrow .meta h3{font-size:15px}
.exrow .meta p{color:var(--dim);font-size:13px}
.exrow .go{color:var(--acc);font-size:20px}

.goal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px}
.goal .row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;gap:8px}
.goal .row b{font-family:'Chakra Petch',monospace;white-space:nowrap}
.bar{height:9px;background:var(--panel2);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--hot),var(--acc),var(--acc2));
  border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.goal.done{border-color:var(--grn)}
.goal.done .row b{color:var(--grn)}

/* ---------- workout ---------- */
#screen-workout{padding:0}
.cam-wrap{position:relative;width:100%;height:100dvh;background:#000;overflow:hidden}
#video,#overlay{position:absolute;inset:0;width:100%;height:100%}
#video{object-fit:cover}
.hud-top{position:absolute;top:0;left:0;right:0;padding:calc(12px + env(safe-area-inset-top)) 14px 34px;
  display:flex;justify-content:space-between;align-items:flex-start;z-index:10;
  background:linear-gradient(180deg,rgba(10,10,12,.85),transparent)}
.hud-bottom{position:absolute;bottom:0;left:0;right:0;padding:26px 16px calc(16px + env(safe-area-inset-bottom));
  z-index:10;background:linear-gradient(0deg,rgba(10,10,12,.92),transparent)}
.exname{font-family:'Chakra Petch',monospace;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.06em;max-width:60%}
.exname small{display:block;color:var(--acc2);font-size:11px;font-weight:500;margin-top:2px;text-transform:none;letter-spacing:0}

.counter{display:flex;align-items:baseline;gap:12px;justify-content:center;margin-bottom:2px}
.counter .num{font-family:'Chakra Petch',monospace;font-weight:700;font-size:62px;line-height:1;color:#fff;
  text-shadow:0 0 18px color-mix(in srgb,var(--acc) 65%,transparent)}
.counter .lbl{color:var(--dim);font-size:14px;text-transform:uppercase;font-family:'Chakra Petch',monospace}
.session-sats{text-align:center;font-family:'Chakra Petch',monospace;font-size:14px;color:var(--acc2);margin-bottom:6px;min-height:18px}

.ring-wrap{position:relative;width:74px;height:74px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.12);stroke-width:6}
.ring-fg{fill:none;stroke:var(--acc);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .25s,stroke .25s}
.ring-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Chakra Petch',monospace;font-weight:700;font-size:17px}
.ring-val small{font-size:8px;color:var(--dim);font-weight:500;letter-spacing:.08em}

/* combo */
.combo{position:absolute;left:0;right:0;top:22%;z-index:14;text-align:center;pointer-events:none;
  font-family:'Chakra Petch',monospace;font-weight:700;opacity:0;transform:scale(.6)}
.combo.show{animation:comboA .9s cubic-bezier(.2,1.4,.3,1) forwards}
@keyframes comboA{0%{opacity:0;transform:scale(.5) rotate(-4deg)}30%{opacity:1;transform:scale(1.2) rotate(2deg)}
  55%{transform:scale(1)}100%{opacity:0;transform:scale(1.05) translateY(-24px)}}
.combo .x{font-size:52px;color:var(--acc);text-shadow:0 0 24px var(--acc),0 0 60px color-mix(in srgb,var(--acc) 60%,transparent)}
.combo .t{font-size:15px;letter-spacing:.35em;color:#fff}
.combo-chip{position:absolute;top:calc(96px + env(safe-area-inset-top));right:14px;z-index:11;
  font-family:'Chakra Petch',monospace;font-weight:700;font-size:13px;color:var(--acc);
  background:rgba(10,10,12,.7);border:1px solid var(--acc);border-radius:999px;padding:5px 12px;display:none}
.combo-chip.show{display:block;animation:bump .3s ease}
.combo-chip.broken{border-color:var(--hot);color:var(--hot);animation:shake .35s}
@keyframes shake{25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-3px)}}

.coachmsg{text-align:center;min-height:24px;font-size:16px;font-weight:600;color:var(--acc2);margin-bottom:10px}
.wk-actions{display:flex;gap:10px}
.wk-actions button{flex:1;padding:14px;border-radius:12px;font-weight:700;font-size:13px;letter-spacing:.05em;text-transform:uppercase}
.btn-stop{background:var(--panel);border:1px solid var(--hot);color:var(--hot)}
.btn-acc{background:linear-gradient(135deg,var(--acc),var(--hot));color:#0A0A0C;box-shadow:var(--glow)}
.btn-ghost{background:var(--panel);border:1px solid var(--line);color:var(--txt)}

.satpop{position:absolute;z-index:20;font-family:'Chakra Petch',monospace;font-weight:700;pointer-events:none;
  color:var(--acc2);text-shadow:0 0 14px var(--acc);animation:pop 1.5s ease-out forwards;white-space:nowrap}
.satpop.perfect{color:var(--grn);text-shadow:0 0 16px rgba(61,255,160,.9)}
@keyframes pop{0%{transform:translateY(0) scale(.6);opacity:0}12%{opacity:1;transform:translateY(-14px) scale(1.15)}
  30%{transform:translateY(-30px) scale(1)}100%{transform:translateY(-130px) scale(1);opacity:0}}
.flash{position:absolute;inset:0;z-index:15;pointer-events:none;opacity:0;background:radial-gradient(circle,rgba(61,255,160,.26),transparent 65%)}
.flash.on{animation:flashA .55s ease-out}
@keyframes flashA{0%{opacity:0}25%{opacity:1}100%{opacity:0}}

.statuspill{position:absolute;top:calc(78px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:16;
  background:rgba(10,10,12,.92);border:1px solid var(--acc);border-radius:12px;padding:12px 20px;
  font-family:'Chakra Petch',monospace;font-size:14px;text-align:center;display:none;max-width:80%;line-height:1.4;
  box-shadow:0 4px 20px rgba(0,0,0,.5)}
.statuspill.show{display:block}
.statuspill.big{top:50%;transform:translate(-50%,-50%);font-size:100px;padding:6px 44px;border-width:2px;
  background:rgba(10,10,12,.7);animation:cdpop .8s ease-out}
@keyframes cdpop{0%{transform:translate(-50%,-50%) scale(1.6);opacity:0}20%{opacity:1}100%{transform:translate(-50%,-50%) scale(1)}}
/* jauge d'alignement */
.align-meter{position:absolute;bottom:calc(150px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  z-index:16;width:64%;max-width:280px;display:none}
.align-meter.show{display:block}
.align-meter .track{height:8px;background:rgba(10,10,12,.7);border:1px solid var(--line);border-radius:99px;overflow:hidden}
.align-meter .fill{height:100%;width:0;background:linear-gradient(90deg,var(--hot),var(--acc),var(--grn));
  border-radius:99px;transition:width .12s}
.align-meter .lbl{text-align:center;font-family:'Chakra Petch',monospace;font-size:11px;color:var(--acc2);
  margin-top:5px;letter-spacing:.08em;text-transform:uppercase}

/* ---------- modals ---------- */
.modal{position:fixed;inset:0;z-index:50;background:rgba(5,5,8,.86);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal.show{display:flex}
.sheet{background:var(--panel);border:1px solid var(--line);border-bottom:none;border-radius:20px 20px 0 0;
  width:100%;max-width:520px;padding:22px 18px calc(24px + env(safe-area-inset-bottom));max-height:88dvh;overflow-y:auto}
.sheet h2{font-size:17px;margin-bottom:14px;color:var(--acc2)}
.hint{font-size:13.5px;color:var(--dim);line-height:1.45;margin:10px 0}
.sheet .wk-actions{margin-top:16px}
#qrbox{background:#fff;border-radius:14px;padding:14px;width:fit-content;margin:14px auto;box-shadow:var(--glow)}
.reward-title{text-align:center;font-family:'Chakra Petch',monospace;font-weight:700;font-size:24px;color:var(--grn);
  text-shadow:0 0 16px rgba(61,255,160,.6);margin-bottom:4px}
.reward-sub{text-align:center;color:var(--dim);font-size:14px}
.langrow{display:flex;gap:8px;margin:8px 0 4px}
.langrow button{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);font-size:14px;font-weight:600}
.langrow button.sel{border-color:var(--acc);color:var(--acc);box-shadow:var(--glow)}
.method-tabs{display:flex;gap:8px;margin:14px 0 12px}
.method-tabs button{flex:1;padding:11px 8px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);
  font-family:'Chakra Petch',monospace;font-size:12.5px;font-weight:600;letter-spacing:.03em}
.method-tabs button.sel{border-color:var(--acc);color:var(--acc);box-shadow:var(--glow)}
.field{margin:10px 0}
.field label{display:block;font-size:12px;color:var(--dim);text-transform:uppercase;font-family:'Chakra Petch',monospace;
  letter-spacing:.06em;margin-bottom:6px}
.field input{width:100%;padding:13px 14px;border-radius:11px;border:1px solid var(--line);background:var(--panel2);
  color:var(--txt);font-size:16px;font-family:'Rajdhani',sans-serif}
.field input:focus{outline:none;border-color:var(--acc);box-shadow:var(--glow)}
.acc-id{display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--line);
  border-radius:12px;padding:12px;margin-bottom:12px}
.acc-id span{font-size:26px;filter:drop-shadow(0 0 8px var(--acc))}
.acc-id b{font-family:'Chakra Petch',monospace;font-size:15px;display:block}
.acc-id small{color:var(--dim);font-size:11px;word-break:break-all;font-family:monospace}

.toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--acc);border-radius:12px;padding:11px 18px;z-index:60;
  font-size:14px;display:none;max-width:88%;text-align:center}
.toast.show{display:block;animation:toastA 3.2s forwards}
@keyframes toastA{0%{opacity:0;transform:translate(-50%,10px)}10%,85%{opacity:1;transform:translate(-50%,0)}100%{opacity:0}}

.section-title{font-size:13px;color:var(--dim);text-transform:uppercase;font-family:'Chakra Petch',monospace;
  letter-spacing:.08em;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:"";flex:1;height:1px;background:var(--line)}
/* nav tabs */
.navtabs{display:flex;gap:6px;margin-bottom:16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px}
.navtab{flex:1;padding:9px 4px;border-radius:8px;font-family:'Chakra Petch',monospace;font-size:12px;font-weight:600;
  color:var(--dim);letter-spacing:.02em}
.navtab.sel{background:var(--panel2);color:var(--acc);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--acc) 40%,transparent)}
/* stats */
.stat-hero{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:8px;position:relative;overflow:hidden}
.stat-hero::after{content:"";position:absolute;top:-50%;right:-20%;width:70%;height:120%;
  background:radial-gradient(circle,color-mix(in srgb,var(--acc) 12%,transparent),transparent 70%)}
.stat-big{text-align:center;margin-bottom:14px}
.stat-big b{display:block;font-family:'Chakra Petch',monospace;font-size:46px;line-height:1;color:var(--acc);
  text-shadow:0 0 18px color-mix(in srgb,var(--acc) 50%,transparent)}
.stat-big span{color:var(--dim);font-size:13px;text-transform:uppercase;font-family:'Chakra Petch',monospace;letter-spacing:.08em}
.stat-row{display:flex;gap:10px}
.stat-cell{flex:1;background:var(--panel2);border-radius:12px;padding:12px 8px;text-align:center}
.stat-cell b{display:block;font-family:'Chakra Petch',monospace;font-size:22px;color:var(--txt)}
.stat-cell span{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
.chartcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
.disc-bar{margin-bottom:10px}
.disc-bar .l{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.disc-bar .l b{font-family:'Chakra Petch',monospace}
/* board */
.board-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.board-head .hint{flex:1;margin:0}
.board-refresh{padding:9px 12px;border-radius:10px;font-size:12px;white-space:nowrap}
.board-row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:12px;margin-bottom:8px}
.board-row .rank{font-family:'Chakra Petch',monospace;font-weight:700;font-size:18px;width:32px;text-align:center;color:var(--dim)}
.board-row.top1 .rank{color:#FFD23F}.board-row.top2 .rank{color:#C0C0C0}.board-row.top3 .rank{color:#CD7F32}
.board-row.me{border-color:var(--acc);box-shadow:var(--glow)}
.board-row .who{flex:1}.board-row .who b{font-family:'Chakra Petch',monospace;font-size:14px}
.board-row .who small{display:block;color:var(--dim);font-size:11px;font-family:monospace}
.board-row .score{font-family:'Chakra Petch',monospace;font-weight:700;color:var(--acc)}
.board-publish{width:100%;padding:14px;border-radius:12px;font-weight:700;margin-top:6px}
/* challenge */
.chal-builder{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
.chal-builder select{width:100%;padding:13px 14px;border-radius:11px;border:1px solid var(--line);
  background:var(--panel2);color:var(--txt);font-size:16px;font-family:'Rajdhani',sans-serif}
.chal-builder .btn-acc{width:100%;padding:14px;border-radius:12px;font-weight:700;margin-top:6px}
.chal-card{background:var(--panel);border:1px solid var(--acc);border-radius:14px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.chal-card h3{font-size:16px;margin-bottom:6px}
.chal-card .chal-prog{color:var(--dim);font-size:13px;margin-bottom:10px}
.chal-card .chal-actions{display:flex;gap:8px;margin-top:12px}
.chal-card .chal-actions button{flex:1;padding:11px;border-radius:10px;font-weight:600;font-size:12.5px}
.faucet-info{display:flex;gap:10px;margin:14px 0 4px}
.faucet-info .box{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.faucet-info .box b{display:block;font-family:'Chakra Petch',monospace;font-size:17px;color:var(--acc)}
.faucet-info .box span{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em}

@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body data-theme="muscu">
<div class="aurora"></div>

<!-- ============ HOME ============ -->
<div class="screen active" id="screen-home">
  <div class="topbar">
    <div class="brand">PoW<b>·</b>COACH<b>⚡</b></div>
    <div style="display:flex;gap:8px;align-items:center">

/* ---------- stats à vie ---------- */
function ensureStats(){
  if(!S.stats) S.stats={totalReps:0,totalPerfect:0,totalSats:0,streak:0,lastDay:'',byDisc:{},hist:{}};
  return S.stats;
}
function bumpStat(discId,perfect,sats){
  const st=ensureStats(),today=new Date().toISOString().slice(0,10);
  st.totalReps++; if(perfect)st.totalPerfect++; st.totalSats+=sats||0;
  st.byDisc[discId]=(st.byDisc[discId]||0)+1;
  st.hist[today]=(st.hist[today]||0)+1;
  // streak : jours consécutifs avec ≥1 rep
  if(st.lastDay!==today){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    st.streak = st.lastDay===y ? st.streak+1 : 1;
    st.lastDay=today;
  }
  store.set('powstats',st);
}

let voices=[];
function loadVoices(){ voices=speechSynthesis.getVoices(); }

function say(text,{force=false}={}){
  if(!S.voice || !('speechSynthesis' in window) || !text) return;
  const now=Date.now();
  if(!force && now-S.lastVoice<1400) return;  // anti-spam
  S.lastVoice=now;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.replace(/[⚡🔥💪🙏🌳🚀]/g,''));
  u.lang=VOICE_LANG[S.lang]; u.rate=1.08; u.pitch=1.0; u.volume=1;
  const v=voices.find(v=>v.lang===u.lang)||voices.find(v=>v.lang.startsWith(S.lang));
  if(v) u.voice=v;
  speechSynthesis.speak(u);
}

function weekId(){const d=new Date();const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-day);
  const y0=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return t.getUTCFullYear()+'-W'+Math.ceil((((t-y0)/864e5)+1)/7);}
function ensureWeek(){const id=weekId();
  if(!S.week||S.week.id!==id){S.week={id,progress:{}};S.claimed={};persist();}}
function ensureDay(){const d=new Date().toISOString().slice(0,10);
  if(!S.day||S.day.date!==d){S.day={date:d,earned:0};store.set('powday',S.day);}}
function persist(){store.set('powweek',S.week);store.set('powclaimed',S.claimed);
  store.set('powbalance',S.balance);store.set('powday',S.day);}
function capLeft(){ensureDay();return Math.max(0,CFG.DAILY_CAP_SATS-S.day.earned);}

   GÉOMÉTRIE & MOTEURS (messages = clés i18n)
   ========================================================= */
function ang(a,b,c){const v1={x:a.x-b.x,y:a.y-b.y},v2={x:c.x-b.x,y:c.y-b.y};
  const dot=v1.x*v2.x+v1.y*v2.y,m=Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y);
  return m===0?180:Math.acos(Math.min(1,Math.max(-1,dot/m)))*180/Math.PI;}
const avg=(a,b)=>(a+b)/2;
const vis=(P,ids)=>ids.every(i=>P[i]&&(P[i].visibility===undefined||P[i].visibility>0.5));
const gs=(val,ideal,tol)=>Math.max(0,Math.round(100*Math.exp(-((val-ideal)**2)/(2*tol*tol))));
const kneeAngle=P=>avg(ang(P[23],P[25],P[27]),ang(P[24],P[26],P[28]));
const elbowAngle=P=>avg(ang(P[11],P[13],P[15]),ang(P[12],P[14],P[16]));
const bodyLine=P=>avg(ang(P[11],P[23],P[27]),ang(P[12],P[24],P[28]));
const hipAngle=P=>avg(ang(P[11],P[23],P[25]),ang(P[12],P[24],P[26]));

function repEngine(o){let state='up',count=0,fb=0,lastRep=0,reached=false;
  const MIN_MS=350; // anti-rebond : pas 2 reps en moins de 350ms
  return{type:'reps',count:()=>count,analyze(P){
    if(!vis(P,o.need))return{form:null,msg:'frame'};
    const v=o.value(P),form=o.form(P,v);let msg=o.coach(P,v,state);
    const now=performance.now();
    if(state==='up'&&v<o.downAt){state='down';fb=form;reached=false;}
    else if(state==='down'){fb=Math.max(fb,form);
      if(v<o.downAt-8)reached=true; // exige une VRAIE descente (marge sous le seuil)
      if(v>o.upAt&&reached&&now-lastRep>MIN_MS){state='up';lastRep=now;count++;
        return{rep:true,repForm:fb,form,msg};}
      if(v>o.upAt)state='up';}
    return{form,msg};}};}
function holdEngine(o){let sec=0,last=null;
  return{type:'hold',count:()=>Math.floor(sec),analyze(P,now){
    if(!vis(P,o.need)){last=null;return{form:null,msg:'frame'};}
    const form=o.form(P),good=form>=55;
    if(good){if(last!==null){const prev=Math.floor(sec);sec+=(now-last)/1000;
        if(Math.floor(sec)>prev)return{tick:true,tickForm:form,form,msg:o.coach(P,form)};}
      last=now;}else last=null;
    return{form,msg:good?o.coach(P,form):o.badMsg};}};}
function punchEngine(){let armed={l:true,r:true},count=0;
  return{type:'reps',count:()=>count,analyze(P){
    if(!vis(P,[11,12,13,14,15,16]))return{form:null,msg:'torso'};
    const eL=ang(P[11],P[13],P[15]),eR=ang(P[12],P[14],P[16]);
    const guard=avg(gs(Math.min(eL,eR),55,35),60);let hit=null;
    if(armed.l&&eL>158&&Math.abs(P[15].y-P[11].y)<0.18){armed.l=false;hit=eL;}
    if(armed.r&&eR>158&&Math.abs(P[16].y-P[12].y)<0.18){armed.r=false;hit=eR;}
    if(eL<120)armed.l=true;if(eR<120)armed.r=true;
    if(hit){count++;const f=gs(hit,172,10);
      return{rep:true,repForm:f,form:f,msg:f>=90?'punch_full':'punch_ext'};}
    return{form:guard,msg:'punch_guard'};}};}

  S.landmarker=await PoseLandmarker.createFromOptions(fs,{
    baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task",delegate:"GPU"},
    runningMode:"VIDEO",numPoses:1,
    minPoseDetectionConfidence:0.6, minPosePresenceConfidence:0.6, minTrackingConfidence:0.6});
}
/* ---- lissage temporel des landmarks (One-Euro-like) : supprime le tremblement ---- */
let smoothLM=null;
function smoothLandmarks(P){
  if(!smoothLM || smoothLM.length!==P.length){ smoothLM=P.map(p=>({...p})); return smoothLM; }
  const a=0.5; // 0=figé, 1=brut ; 0.5 = bon compromis réactivité/stabilité
  for(let i=0;i<P.length;i++){
    smoothLM[i].x=smoothLM[i].x+a*(P[i].x-smoothLM[i].x);
    smoothLM[i].y=smoothLM[i].y+a*(P[i].y-smoothLM[i].y);
    smoothLM[i].z=(smoothLM[i].z||0)+a*((P[i].z||0)-(smoothLM[i].z||0));
    smoothLM[i].visibility=P[i].visibility;
  }
  return smoothLM;
}
async function startCamera(){
  const v=$('video');

  v.srcObject=stream;await v.play();

  S.ctx=c.getContext('2d');S.drawer=new DrawingUtils(S.ctx);

/* =========================================================
   POSES GUIDES — silhouette cible en coordonnées normalisées (0..1)
   Squelette de départ que l'utilisateur doit imiter avant le GO.
   idx MediaPipe : 0 nez,11/12 épaules,13/14 coudes,15/16 poignets,
   23/24 hanches,25/26 genoux,27/28 chevilles
   ========================================================= */
const GUIDE_CONNS=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
function standPose(){ // debout de face, bras le long du corps
  return {0:[.5,.12],11:[.42,.28],12:[.58,.28],13:[.40,.45],14:[.60,.45],15:[.39,.60],16:[.61,.60],
    23:[.44,.55],24:[.56,.55],25:[.44,.75],26:[.56,.75],27:[.44,.93],28:[.56,.93]};
}
const GUIDES={
  squat:standPose(), jsquat:standPose(), lunge:standPose(), knee:standPose(),
  jacks:{0:[.5,.12],11:[.40,.28],12:[.60,.28],13:[.30,.20],14:[.70,.20],15:[.24,.10],16:[.76,.10],
    23:[.44,.55],24:[.56,.55],25:[.38,.75],26:[.62,.75],27:[.34,.93],28:[.66,.93]},
  jab:{0:[.5,.14],11:[.40,.30],12:[.60,.30],13:[.34,.42],14:[.66,.42],15:[.42,.34],16:[.58,.34],
    23:[.43,.58],24:[.57,.58],25:[.43,.77],26:[.57,.77],27:[.43,.94],28:[.57,.94]},
  punch2:{0:[.5,.14],11:[.40,.30],12:[.60,.30],13:[.34,.42],14:[.66,.42],15:[.42,.34],16:[.58,.34],
    23:[.43,.58],24:[.57,.58],25:[.43,.77],26:[.57,.77],27:[.43,.94],28:[.57,.94]},
  pushup:{0:[.16,.55],11:[.30,.50],12:[.30,.60],13:[.44,.52],14:[.44,.62],15:[.58,.52],16:[.58,.62],
    23:[.58,.52],24:[.58,.62],25:[.74,.53],26:[.74,.63],27:[.90,.55],28:[.90,.65]},
  plank:{0:[.14,.52],11:[.28,.48],12:[.28,.58],13:[.30,.62],14:[.30,.70],15:[.30,.74],16:[.30,.80],
    23:[.56,.50],24:[.56,.60],25:[.74,.52],26:[.74,.62],27:[.90,.54],28:[.90,.64]},
  bridge:{0:[.14,.60],11:[.30,.56],12:[.30,.64],13:[.24,.66],14:[.24,.74],15:[.20,.72],16:[.20,.80],
    23:[.56,.44],24:[.56,.52],25:[.74,.60],26:[.74,.68],27:[.88,.74],28:[.88,.82]},
  warrior:{0:[.5,.16],11:[.42,.32],12:[.58,.32],13:[.26,.32],14:[.74,.32],15:[.12,.32],16:[.88,.32],
    23:[.44,.56],24:[.56,.56],25:[.30,.72],26:[.62,.78],27:[.22,.92],28:[.66,.94]},
  tree:{0:[.5,.12],11:[.42,.26],12:[.58,.26],13:[.36,.14],14:[.64,.14],15:[.42,.06],16:[.58,.06],
    23:[.45,.54],24:[.55,.54],25:[.45,.74],26:[.60,.60],27:[.45,.93],28:[.52,.62]}
};
function drawGuide(exId,align){
  const g=GUIDES[exId]; if(!g)return;
  const W=S.ctx.canvas.width,H=S.ctx.canvas.height,c=getComputedStyle(document.body);
  const col=align>=0.72?c.getPropertyValue('--grn').trim():c.getPropertyValue('--acc2').trim();
  S.ctx.save();
  S.ctx.globalAlpha=0.35+0.35*Math.sin(Date.now()/380); // respiration
  S.ctx.strokeStyle=col;S.ctx.lineWidth=10;S.ctx.lineCap='round';S.ctx.lineJoin='round';
  S.ctx.shadowColor=col;S.ctx.shadowBlur=18;
  GUIDE_CONNS.forEach(([a,b])=>{ if(g[a]&&g[b]){
    S.ctx.beginPath();S.ctx.moveTo(g[a][0]*W,g[a][1]*H);S.ctx.lineTo(g[b][0]*W,g[b][1]*H);S.ctx.stroke(); }});
  if(g[0]){ S.ctx.beginPath();S.ctx.arc(g[0][0]*W,g[0][1]*H,W*0.045,0,7);S.ctx.stroke(); }
  S.ctx.restore();
}
// score d'alignement (0..1) entre pose détectée et guide
function alignScore(P,exId){
  const g=GUIDES[exId]; if(!g)return 0;
  const ids=Object.keys(g).map(Number).filter(i=>i!==0);
  let sum=0,n=0;
  for(const i of ids){ if(!P[i]||(P[i].visibility!==undefined&&P[i].visibility<0.5))return 0;
    const dx=P[i].x-g[i][0], dy=P[i].y-g[i][1]; sum+=Math.hypot(dx,dy); n++; }
  if(!n)return 0;
  const d=sum/n; // distance moyenne normalisée
  return Math.max(0,Math.min(1,1-d/0.22));
}

let lastVideoTime=-1,smoothForm=0;
const GROUND_EX=['pushup','plank','bridge']; // téléphone au sol → caméra arrière
async function startWorkout(exId){
  ensureWeek();ensureDay();
  S.ex=findEx(exId);S.engine=S.ex.make();S.combo=0;S.comboTier=0;S.sessionSats=0;
  S.phase='align';S.countdown=0;smoothLM=null;S.alignHold=0;S.cdStarted=false;

  show('workout');

function loop(now){
  if(!S.running)return;
  const v=$('video');
  if(v.currentTime!==lastVideoTime&&v.videoWidth){
    lastVideoTime=v.currentTime;
    const res=S.landmarker.detectForVideo(v,now);
    S.ctx.clearRect(0,0,S.ctx.canvas.width,S.ctx.canvas.height);
    if(res.landmarks&&res.landmarks[0]){
      const P=smoothLandmarks(res.landmarks[0]);
      if(S.phase==='align') phaseAlign(P,now);
      else { $('align-meter').classList.remove('show'); drawSkeleton(P); handle(S.engine.analyze(P,now)); }
    }else{
      if(S.phase==='align'){ drawGuide(S.ex.id,0); $('statuspill').textContent=L().coach.frame;
        $('statuspill').classList.add('show'); $('align-meter').classList.remove('show'); S.alignHold=0; S.cdStarted=false; }
      else coachMsg('lost');
    }
  }
  requestAnimationFrame(loop);
}
/* phase d'alignement : imiter la silhouette pour lancer le compte à rebours */
function phaseAlign(P,now){
  const a=alignScore(P,S.ex.id);
  drawGuide(S.ex.id,a);
  drawSkeleton(P,0.55);
  const pill=$('statuspill'),meter=$('align-meter');
  // jauge d'alignement visible pendant toute la phase (sauf compte à rebours)
  meter.classList.add('show');
  $('align-fill').style.width=Math.round(a*100)+'%';
  $('align-lbl').textContent=a>=0.72?'✓':(Math.round(a*100)+'%');
  if(a>=0.72){
    S.alignHold=(S.alignHold||0)+1;
    if(S.alignHold===1) say(L().voice.getReady,{force:true});
    const need=16;
    if(S.alignHold>=need){
      meter.classList.remove('show');
      if(!S.cdStarted){ S.cdStarted=true; S.cdVal=3; S.cdNext=now; }
      if(now>=S.cdNext){
        if(S.cdVal>0){ pill.textContent=String(S.cdVal); pill.classList.add('show','big');
          say(String(S.cdVal),{force:true}); if(navigator.vibrate)navigator.vibrate(20); S.cdVal--; S.cdNext=now+800; }
        else { pill.classList.remove('show','big'); S.cdStarted=false;
          S.phase='live'; coachMsg(null); say(L().voice.start,{force:true});
          if(navigator.vibrate)navigator.vibrate([60,40,120]); }
      }
    } else { pill.textContent=L().alignHold; pill.classList.add('show'); pill.classList.remove('big'); }
  } else {
    S.alignHold=0; S.cdStarted=false;
    pill.textContent=L().alignPose; pill.classList.add('show'); pill.classList.remove('big');
  }
}
function drawSkeleton(P,alpha){
  const c=getComputedStyle(document.body);
  S.ctx.save();S.ctx.globalAlpha=alpha||1;S.ctx.shadowColor=c.getPropertyValue('--acc');S.ctx.shadowBlur=12;
  S.drawer.drawConnectors(P,PoseLandmarker.POSE_CONNECTIONS,{color:c.getPropertyValue('--acc').trim(),lineWidth:4});
  S.drawer.drawLandmarks(P,{color:c.getPropertyValue('--acc2').trim(),radius:4});
  S.ctx.restore();
}
function coachMsg(key){$('coachmsg').textContent=key?(L().coach[key]||key):'';}
function setRing(f){
  const r=$('ring'),C=194.8;
  if(f===null){r.style.strokeDashoffset=C;$('ring-num').textContent='—';return;}
  smoothForm=smoothForm*0.7+f*0.3;
  const s=Math.round(smoothForm);
  r.style.strokeDashoffset=C*(1-s/100);
  r.style.stroke=s>=CFG.PERFECT_THRESHOLD?'var(--grn)':s>=60?'var(--acc)':'var(--hot)';
  $('ring-num').textContent=s;
}
function handle(r){

}

   ========================================================= */
function comboSats(){
  let sats=CFG.SATS_PERFECT;
  for(const t of CFG.COMBO_TIERS) if(S.combo>=t.at) sats=t.sats;
  return sats;
}
function earn(sats){
  ensureDay();
  const grant=Math.min(sats,capLeft());
  if(grant>0){S.balance+=grant;S.day.earned+=grant;S.sessionSats+=grant;
    $('session-sats').textContent=L().sessionSats(S.sessionSats);
    persist();}
  if(grant<sats){coachMsg(null);$('coachmsg').textContent=L().capHit;say(L().voice.cap);}
  return grant;
}
function onScore(form){
  const id=S.ex.id,T=L();
  const before=S.week.progress[id]||0;
  S.week.progress[id]=before+1;
  $('wk-count').textContent=S.week.progress[id];
  const perfect=form>=CFG.PERFECT_THRESHOLD;
  let gotSats=0;

  if(perfect){
    S.combo++;
    const sats=comboSats(),got=earn(sats);gotSats=got;
    if(got>0){satPop('+'+got+' ⚡',true);flash();}
    // palier de combo franchi ?
    const tier=CFG.COMBO_TIERS.filter(t=>S.combo>=t.at).length;
    if(tier>S.comboTier){S.comboTier=tier;showCombo(S.combo);say(T.voice.combo(S.combo),{force:true});
      if(navigator.vibrate)navigator.vibrate([40,50,40,50,90]);}
    else{say(T.voice.perfect);if(navigator.vibrate)navigator.vibrate(30);}
    const chip=$('combo-chip');chip.textContent=T.combo+' x'+S.combo;chip.className='combo-chip show';
  }else{
    if(S.combo>=(CFG.COMBO_TIERS[0]?.at||5)){
      const chip=$('combo-chip');chip.textContent=T.comboBroken;chip.className='combo-chip show broken';
      say(T.voice.comboBroken);setTimeout(()=>{chip.className='combo-chip';},1200);
    } else $('combo-chip').className='combo-chip';
    S.combo=0;S.comboTier=0;
    if(S.ex.unit!=='sec')satPop('+1',false);
  }
  // stats à vie + défis
  bumpStat(S.ex.sport.id,perfect,gotSats);
  bumpChallenges(id);
  // jalons vocaux (toutes les 10)
  if(S.week.progress[id]%10===0)say(T.voice.milestone(S.week.progress[id],S.ex.unit));
  // objectif hebdo
  if(before<S.ex.goal&&S.week.progress[id]>=S.ex.goal&&!S.claimed[id]){
    S.claimed[id]=true;
    const got=earn(CFG.SATS_WEEKLY_GOAL);
    satPop('🏆 +'+got+' ⚡',true);flash();
    $('coachmsg').textContent='🏆 '+T.voice.goal;
    say(T.voice.goal,{force:true});
    if(navigator.vibrate)navigator.vibrate([80,60,80,60,180]);
  }
  const bc=$('chip-balance');bc.classList.remove('bump');void bc.offsetWidth;bc.classList.add('bump');
  $('balance-val').textContent=S.balance;
}
function bumpChallenges(exId){
  let changed=false;
  for(const c of S.challenges){
    if(c.done)continue;
    if(c.ex===exId||c.ex==='any'){ c.prog=(c.prog||0)+1; changed=true;
      if(c.prog>=c.target){ c.done=true; say(L().voice.goal,{force:true}); }
    }
  }
  if(changed)store.set('powchallenges',S.challenges);
}

  el.style.left=(28+Math.random()*44)+'%';el.style.top=(34+Math.random()*22)+'%';

function renderStats(){
  const st=ensureStats(),T=L();

  $('stat-sats').textContent=st.totalSats;
  $('stat-perfect').textContent=st.totalReps?Math.round(st.totalPerfect/st.totalReps*100)+'%':'0%';
  // 7 derniers jours
  const days=[],vals=[];
  for(let i=6;i>=0;i--){ const d=new Date(Date.now()-i*864e5).toISOString().slice(0,10);
    days.push(d.slice(5)); vals.push(st.hist[d]||0); }
  drawBars($('chart7'),days,vals);
  // par discipline
  const wrap=$('disc-bars');wrap.innerHTML='';
  const max=Math.max(1,...Object.values(st.byDisc));
  SPORTS.forEach(sp=>{ const v=st.byDisc[sp.id]||0; if(v===0)return;
    const d=document.createElement('div');d.className='disc-bar';
    d.innerHTML=`<div class="l"><span>${sp.em} ${sp.name[S.lang]}</span><b>${v}</b></div>
      <div class="bar"><i style="width:${Math.round(v/max*100)}%;background:${THEME_C[sp.theme]}"></i></div>`;
    wrap.appendChild(d); });
  if(!wrap.children.length){ wrap.innerHTML=`<p class="hint">${T.noStats}</p>`; }
}
function drawBars(cv,labels,vals){
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth||cv.parentElement.clientWidth-28, H=cv.height;
  cv.width=W*dpr;cv.height=H*dpr;const x=cv.getContext('2d');x.scale(dpr,dpr);
  if(!x.roundRect)x.roundRect=(a,b,w,h,r)=>{x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);
    x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();};
  x.clearRect(0,0,W,H);
  const cs=getComputedStyle(document.body),acc=cs.getPropertyValue('--acc').trim(),
    dim=cs.getPropertyValue('--dim').trim(),max=Math.max(1,...vals);
  const pad=24,bw=(W-pad*2)/labels.length*0.6,gap=(W-pad*2)/labels.length;
  vals.forEach((v,i)=>{ const bh=(H-34)*(v/max),bx=pad+i*gap+(gap-bw)/2,by=H-24-bh;
    const g=x.createLinearGradient(0,by,0,H-24);g.addColorStop(0,acc);g.addColorStop(1,'transparent');
    x.fillStyle=g;x.beginPath();x.roundRect(bx,by,bw,bh,4);x.fill();
    if(v>0){x.fillStyle=acc;x.font='700 11px Chakra Petch';x.textAlign='center';x.fillText(v,bx+bw/2,by-4);}
    x.fillStyle=dim;x.font='10px Rajdhani';x.textAlign='center';x.fillText(labels[i],bx+bw/2,H-8); });
}

/* =========================================================
   LEADERBOARD NOSTR — publie/lit des scores (kind 30078, addressable)
   Chaque athlète publie son total de reps sous un tag d-identifiant "powcoach-score".
   Lecture agrégée depuis plusieurs relays via WebSocket brut (aucune lib).
   ========================================================= */
// clé Nostr locale (générée si absente) — identité du leaderboard
async function nostrKey(){
  let sk=store.get('pownostrsk','');
  if(!sk){ const a=new Uint8Array(32);crypto.getRandomValues(a);
    sk=[...a].map(b=>b.toString(16).padStart(2,'0')).join('');store.set('pownostrsk',sk); }
  return sk;
}
// secp256k1 schnorr : on utilise la lib noble via CDN dynamique (chargée à la 1re pub)
let nobleReady=null;
async function loadNoble(){
  if(nobleReady)return nobleReady;
  nobleReady=(async()=>{
    const m=await import('https://cdn.jsdelivr.net/npm/@noble/secp256k1@2.1.0/+esm');
    return m;
  })();
  return nobleReady;
}
async function sha256hex(str){ const b=new TextEncoder().encode(str);
  const h=await crypto.subtle.digest('SHA-256',b);return [...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
async function signEvent(ev){
  const secp=await loadNoble();
  const sk=await nostrKey();
  ev.pubkey=secp.utils.bytesToHex(secp.schnorr.getPublicKey(sk));
  store.set('pownostrpub',ev.pubkey);
  const serial=JSON.stringify([0,ev.pubkey,ev.created_at,ev.kind,ev.tags,ev.content]);
  ev.id=await sha256hex(serial);
  const sig=await secp.schnorr.sign(ev.id,sk);
  ev.sig=secp.utils.bytesToHex(sig);
  return ev;
}
window.publishScore=async()=>{
  const T=L(),st=ensureStats();
  if(st.totalReps<1){toast(T.noStats);return;}
  const btn=$('board-publish');btn.disabled=true;btn.textContent=T.publishing;
  try{
    const nick=S.nick||prompt(T.askNick)||('athlete'+Math.floor(Math.random()*9999));
    S.nick=nick.slice(0,20);store.set('pownick',S.nick);
    const ev=await signEvent({ kind:30078, created_at:Math.floor(Date.now()/1000),
      tags:[['d','powcoach-score'],['n',S.nick],['reps',String(st.totalReps)],['streak',String(st.streak)],['t','powcoach']],
      content:JSON.stringify({reps:st.totalReps,streak:st.streak,perfect:st.totalPerfect,nick:S.nick}) });
    let ok=0;
    await Promise.all(DEFAULT_RELAYS.map(r=>publishTo(r,ev).then(()=>ok++).catch(()=>{})));
    toast(ok?T.published(ok):T.pubFail);
    loadBoard(true);
  }catch(e){toast(T.err+(e.message||''));}
  btn.disabled=false;btn.textContent=T.publish;
};
function publishTo(url,ev){ return new Promise((res,rej)=>{
  const ws=new WebSocket(url);const to=setTimeout(()=>{ws.close();rej();},4000);
  ws.onopen=()=>ws.send(JSON.stringify(["EVENT",ev]));
  ws.onmessage=(m)=>{ try{const d=JSON.parse(m.data);
    if(d[0]==='OK'){clearTimeout(to);ws.close();res();}}catch(e){} };
  ws.onerror=()=>{clearTimeout(to);rej();};
}); }
window.loadBoard=async(force)=>{
  const T=L(),list=$('board-list');
  if(!force && list.dataset.loaded){return;}
  list.innerHTML=`<p class="hint">${T.boardLoading}</p>`;
  const scores=new Map(); // pubkey -> {nick,reps,streak}
  await Promise.all(DEFAULT_RELAYS.map(r=>queryRelay(r,scores)));
  const arr=[...scores.values()].sort((a,b)=>b.reps-a.reps).slice(0,50);
  const myPub=store.get('pownostrpub','');
  list.innerHTML='';
  if(!arr.length){ list.innerHTML=`<p class="hint">${T.boardEmpty}</p>`; }
  arr.forEach((s,i)=>{ const row=document.createElement('div');
    row.className='board-row'+(i<3?' top'+(i+1):'')+(s.pub===myPub?' me':'');
    row.innerHTML=`<div class="rank">${i<3?['🥇','🥈','🥉'][i]:'#'+(i+1)}</div>
      <div class="who"><b>${esc(s.nick||'anon')}</b><small>${s.pub.slice(0,12)}…</small></div>
      <div class="score">${s.reps} reps${s.streak>1?' · 🔥'+s.streak:''}</div>`;
    list.appendChild(row); });
  list.dataset.loaded='1';
};
function queryRelay(url,scores){ return new Promise((res)=>{
  let ws;try{ws=new WebSocket(url);}catch(e){return res();}
  const sub='pow'+Math.random().toString(36).slice(2,8);
  const to=setTimeout(()=>{try{ws.close();}catch(e){}res();},4500);
  ws.onopen=()=>ws.send(JSON.stringify(["REQ",sub,{kinds:[30078],"#t":["powcoach"],limit:200}]));
  ws.onmessage=(m)=>{ try{const d=JSON.parse(m.data);
    if(d[0]==='EVENT'){ const ev=d[2]; let data={};
      try{data=JSON.parse(ev.content);}catch(e){}
      const reps=parseInt(data.reps||0,10);
      const prev=scores.get(ev.pubkey);
      if(!prev||reps>prev.reps) scores.set(ev.pubkey,{pub:ev.pubkey,nick:data.nick,reps,streak:parseInt(data.streak||0,10)});
    } else if(d[0]==='EOSE'){ clearTimeout(to);try{ws.close();}catch(e){}res(); } }catch(e){} };
  ws.onerror=()=>{clearTimeout(to);res();};
}); }
const esc=s=>String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));

window.createChallenge=()=>{
  const T=L(),ex=$('chal-ex').value,target=parseInt($('chal-target').value,10)||100;

window.deleteChallenge=(i)=>{ S.challenges.splice(i,1);store.set('powchallenges',S.challenges);renderChallenges(); };
window.shareChallenge=async(i)=>{
  const T=L(),c=S.challenges[i];
  const ex=c.ex==='any'?null:findEx(c.ex);
  const exName=c.ex==='any'?T.chalAny:(ex?ex.name[S.lang]:c.ex);
  // lien de défi (paramètres dans le hash — l'app les lit au chargement)
  const link=location.origin+location.pathname+'#chal='+encodeURIComponent(btoa(JSON.stringify({e:c.ex,t:c.target,n:exName})));
  // image générée
  const blob=await challengeImage(exName,c.target,T);
  try{
    if(navigator.share && blob){
      const file=new File([blob],'powcoach-defi.png',{type:'image/png'});
      await navigator.share({ title:'PoW Coach ⚡', text:T.chalShareText(c.target,exName)+' '+link, files:[file] });
    }else if(navigator.share){
      await navigator.share({ title:'PoW Coach ⚡', text:T.chalShareText(c.target,exName), url:link });
    }else{
      await navigator.clipboard.writeText(link);toast(T.copied);
      if(blob)downloadBlob(blob,'powcoach-defi.png');
    }
  }catch(e){ try{await navigator.clipboard.writeText(link);toast(T.copied);}catch(_){} }
};
function downloadBlob(blob,name){ const u=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000); }
async function challengeImage(exName,target,T){
  const W=1080,H=1080,cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const x=cv.getContext('2d');
  const cs=getComputedStyle(document.body),acc=cs.getPropertyValue('--acc').trim();
  // fond
  x.fillStyle='#0A0A0C';x.fillRect(0,0,W,H);
  const g=x.createRadialGradient(W/2,H*0.38,60,W/2,H*0.38,W*0.7);
  g.addColorStop(0,acc+'40');g.addColorStop(1,'transparent');x.fillStyle=g;x.fillRect(0,0,W,H);
  // scanlines
  x.fillStyle='rgba(255,255,255,.02)';for(let y=0;y<H;y+=4)x.fillRect(0,y,W,2);
  // cadre
  x.strokeStyle=acc;x.lineWidth=6;x.strokeRect(40,40,W-80,H-80);
  // titre
  x.fillStyle=acc;x.font='700 64px Chakra Petch, monospace';x.textAlign='center';
  x.shadowColor=acc;x.shadowBlur=30;x.fillText('POW · COACH ⚡',W/2,180);
  x.shadowBlur=0;
  // défi
  x.fillStyle='#EDEDF2';x.font='700 44px Chakra Petch, monospace';
  x.fillText(T.chalImgTitle,W/2,360);
  x.fillStyle=acc;x.font='700 180px Chakra Petch, monospace';x.shadowColor=acc;x.shadowBlur=40;
  x.fillText(String(target),W/2,560);x.shadowBlur=0;
  x.fillStyle='#EDEDF2';x.font='600 56px Chakra Petch, monospace';
  x.fillText(exName.toUpperCase(),W/2,650);
  // sous-titre
  x.fillStyle='#8A8A99';x.font='400 34px Rajdhani, sans-serif';
  x.fillText(T.chalImgSub,W/2,760);
  // pied
  x.fillStyle=acc;x.font='700 40px Chakra Petch, monospace';
  x.fillText('coachsats.pages.dev',W/2,H-100);
  return await new Promise(r=>cv.toBlob(r,'image/png'));
}
// import d'un défi via lien (#chal=...)
function importChallengeFromHash(){
  const m=location.hash.match(/chal=([^&]+)/);
  if(!m)return;
  try{ const d=JSON.parse(atob(decodeURIComponent(m[1])));
    // valide strictement : exercice connu (ou "any") + objectif entier borné
    const known = d.e==='any' || !!findEx(d.e);
    const tgt = parseInt(d.t,10);
    if(known && Number.isFinite(tgt) && tgt>0 && tgt<=100000){
      if(!S.challenges.some(c=>c.ex===d.e&&c.target===tgt&&!c.done)){
        S.challenges.unshift({ id:Math.random().toString(36).slice(2,9), ex:d.e, target:tgt, prog:0, done:false,
          week:weekId(), title:'', ts:Date.now(), imported:true });
        store.set('powchallenges',S.challenges);
        toast(L().chalImported);
      }
    }
  }catch(e){}
  history.replaceState(null,'',location.pathname);
}
